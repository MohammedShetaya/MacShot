name: MacShot
options:
  bundleIdPrefix: com.macshot
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  MacShot:
    type: application
    platform: macOS
    sources:
      - path: Sources/MacShot
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macshot.app
        INFOPLIST_FILE: Sources/MacShot/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/MacShot/MacShot.entitlements
        PRODUCT_NAME: MacShot
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: Sources/MacShot/MacShot.entitlements

  MacShotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MacShotTests
    dependencies:
      - target: MacShot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macshot.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MacShot.app/Contents/MacOS/MacShot"
